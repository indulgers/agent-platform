name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (defaults to the current short SHA)'
        required: false
        type: string

concurrency:
  # Never run two deploys in parallel — they'd race on the server.
  group: deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  # GitHub owner the images live under — set to `indulgers` regardless of who
  # triggers the workflow so the path is stable.
  IMAGE_NAMESPACE: indulgers

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        target: [api, web, landing]

    outputs:
      image_tag: ${{ steps.tag.outputs.value }}

    steps:
      - uses: actions/checkout@v4

      - name: Compute tag
        id: tag
        env:
          RAW_INPUT: ${{ inputs.image_tag }}
        run: |
          if [ -n "$RAW_INPUT" ]; then
            # Docker tag must match [a-zA-Z0-9_.-]{1,128}. Normalise whatever
            # the human typed: lowercase, replace any non-allowed char with '-',
            # strip leading/trailing '-'. Fall back to sha-* on empty result.
            slug=$(printf '%s' "$RAW_INPUT" \
              | tr '[:upper:]' '[:lower:]' \
              | sed -E 's/[^a-z0-9_.-]+/-/g; s/^-+//; s/-+$//')
            tag="${slug:-sha-${GITHUB_SHA::7}}"
          else
            tag="sha-${GITHUB_SHA::7}"
          fi
          echo "value=$tag" >> "$GITHUB_OUTPUT"
          echo "Resolved image tag: $tag"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push ${{ matrix.target }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.${{ matrix.target }}
          push: true
          # Tag both the immutable sha-* tag and `latest` so the compose file
          # on the server can stay pinned to :latest without code edits.
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/agent-platform-${{ matrix.target }}:${{ steps.tag.outputs.value }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/agent-platform-${{ matrix.target }}:latest
          # Cache layers in GHA cache so repeat builds are fast.
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}

  deploy:
    name: deploy to vps
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      # Ship the compose + nginx files to the server so it can run the latest
      # topology even if the user hasn't pulled the repo manually. Idempotent —
      # rsync only copies what changed.
      - name: Copy compose + nginx to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: 'deploy/docker-compose.yml,deploy/nginx/default.conf'
          target: ${{ secrets.DEPLOY_DIR }}
          strip_components: 0
          overwrite: true

      - name: SSH deploy — pull + up
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: IMAGE_TAG
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_DIR }}"
            # IMAGE_TAG is exported here so any compose interpolation picks it up.
            # The .env on the server provides everything else.
            export IMAGE_TAG="${IMAGE_TAG}"
            docker compose -f deploy/docker-compose.yml pull
            docker compose -f deploy/docker-compose.yml up -d --remove-orphans
            # Reap dangling images so the VPS disk doesn't bloat.
            docker image prune -f
            echo "--- running containers ---"
            docker compose -f deploy/docker-compose.yml ps
