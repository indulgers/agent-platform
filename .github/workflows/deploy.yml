name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to deploy (defaults to main)'
        required: false
        default: 'main'
        type: string

concurrency:
  # Never run two deploys in parallel — they'd race on the server.
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy to vps
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # SSH_HOST / SSH_USER / SSH_PRIVATE_KEY / DEPLOY_DIR live in the 'prod'
    # GitHub Environment.
    environment: prod

    steps:
      - name: SSH deploy — pull + build + up
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_REF: ${{ inputs.ref || 'main' }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: DEPLOY_REF
          # First build on a 4C8G host can take 5-10 min cold. Subsequent
          # builds are layer-cached and finish in 1-3 min.
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_DIR }}"

            # ---- Sync source ----
            # First run after switching from image-based to build-based: clone
            # if the repo isn't already here. The deploy dir was originally
            # just a flat docker-compose drop, so .git probably doesn't exist.
            if [ ! -d .git ]; then
              echo ">>> first build — initialising git repo in place"
              git init
              git remote add origin https://github.com/indulgers/agent-platform.git
            fi
            git fetch --depth=1 origin "$DEPLOY_REF"
            git reset --hard FETCH_HEAD
            git log -1 --oneline

            # ---- Build + start ----
            # --build forces a rebuild of any service whose Dockerfile or
            # context changed; layer cache makes unchanged stages fast.
            docker compose --env-file .env -f deploy/docker-compose.yml build
            docker compose --env-file .env -f deploy/docker-compose.yml up -d --remove-orphans

            # Reap dangling images so the VPS disk doesn't bloat.
            docker image prune -f

            echo "--- running containers ---"
            docker compose --env-file .env -f deploy/docker-compose.yml ps
