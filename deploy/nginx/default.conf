upstream agent_api {
  server api:3000;
}

upstream agent_web {
  server web:80;
}

upstream agent_landing {
  server landing:80;
}

server {
  listen 80;
  server_name _;

  client_max_body_size 10m;

  # ---- API ---------------------------------------------------------------
  location /api/ {
    proxy_pass http://agent_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection '';

    # SSE: never buffer, keep connections open.
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 1h;
    proxy_send_timeout 1h;
    chunked_transfer_encoding on;
  }

  # ---- SPA (/app/* → upstream web) ---------------------------------------
  # Trailing-slash proxy_pass strips the /app prefix before forwarding, so the
  # SPA container's nginx sees plain paths like /, /login, /assets/...
  # Vite was built with base: '/app/', so all asset URLs in index.html are
  # already prefixed; they re-enter this same location block and get stripped.
  location /app/ {
    proxy_pass http://agent_web/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Bare /app (no trailing slash) → redirect to /app/ so the SPA boots correctly.
  location = /app {
    return 301 /app/;
  }

  # ---- Marketing / landing (everything else) -----------------------------
  location / {
    proxy_pass http://agent_landing;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }
}
