# Full-stack production compose for a single 4C8G host (腾讯云).
#
# Image-based: every app pulls a tag from GHCR. CI in .github/workflows/deploy.yml
# builds and pushes the three images on every main commit; the server just runs
# `docker compose pull && docker compose up -d --remove-orphans` to update.
#
# To deploy locally (e.g. for staging on the same host without going through CI),
# use docker-compose.build.yml which builds the images from source instead.
#
# Public ports:
#   :80    nginx — landing + /app/ (SPA) + /api/ proxy
#   :9100  minio S3 — presigned URLs the browser hits directly
#   :9101  minio web console — lock down with strong creds; can also firewall it
#
# Everything else is on the internal docker network only.

name: agent-platform

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: agent-platform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: agent_platform
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d agent_platform']
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1500M

  redis:
    image: redis:7-alpine
    container_name: agent-platform-redis
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 384M

  minio:
    image: minio/minio:RELEASE.2024-09-13T20-26-02Z
    container_name: agent-platform-minio
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:?S3_ACCESS_KEY is required}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?S3_SECRET_KEY is required}
    ports:
      # S3 API — browser uploads presigned-URL payloads here. Required public.
      - '9100:9000'
      # Web console — strongly recommend firewalling this off from public.
      - '127.0.0.1:9101:9001'
    volumes:
      - miniodata:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 384M

  minio-init:
    image: minio/mc:latest
    container_name: agent-platform-minio-init
    depends_on:
      minio:
        condition: service_healthy
    restart: 'no'
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET:-agent-platform}
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        mc alias set local http://minio:9000 "$$S3_ACCESS_KEY" "$$S3_SECRET_KEY"
        mc mb --ignore-existing local/"$$S3_BUCKET"
        echo "$$S3_BUCKET bucket ready"

  api:
    image: ${GHCR_NAMESPACE:-ghcr.io/indulgers}/agent-platform-api:${IMAGE_TAG:-latest}
    container_name: agent-platform-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/agent_platform
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-}
      LLM_DEFAULT_PROVIDER: ${LLM_DEFAULT_PROVIDER:-anthropic}
      LLM_DEFAULT_MODEL: ${LLM_DEFAULT_MODEL:-claude-sonnet-4-6}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost}
      # S3 / MinIO — internal endpoint for backend calls, public endpoint the
      # browser PUTs presigned URLs against. In single-host prod they're the
      # same docker network internally but differ externally.
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:?S3_PUBLIC_ENDPOINT is required, e.g. http://your-vps:9100}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET:-agent-platform}
      AGENT_MAX_ITERATIONS: ${AGENT_MAX_ITERATIONS:-8}
      AGENT_MAX_TOKENS: ${AGENT_MAX_TOKENS:-4096}
    deploy:
      resources:
        limits:
          memory: 1G

  web:
    image: ${GHCR_NAMESPACE:-ghcr.io/indulgers}/agent-platform-web:${IMAGE_TAG:-latest}
    container_name: agent-platform-web
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

  landing:
    image: ${GHCR_NAMESPACE:-ghcr.io/indulgers}/agent-platform-landing:${IMAGE_TAG:-latest}
    container_name: agent-platform-landing
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M

  nginx:
    image: nginx:1.27-alpine
    container_name: agent-platform-nginx
    restart: unless-stopped
    depends_on:
      - api
      - web
      - landing
    ports:
      - '80:80'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  pgdata:
  redisdata:
  miniodata:
